<!doctype html>
<html lang="en" data-depth="2">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up — IT University</title>
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-box__logo"><span style="color:var(--accent)">IT</span><span>University</span></div>
    <h1>Create your account</h1>
    <p>Join thousands of IT professionals learning on ITU.</p>

    <div class="form-error" id="form-error"></div>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Your name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required autocomplete="new-password" minlength="8">
        <div id="pw-strength" style="margin-top:4px;font-size:var(--text-xs);color:var(--text-muted)"></div>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:8px">Create Account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  if (store.currentUser()) location.href = 'dashboard.html';

  // Live password strength indicator
  document.getElementById('password').addEventListener('input', function() {
    const pw = this.value;
    const el = document.getElementById('pw-strength');
    if (!pw) { el.textContent = ''; return; }
    const checks = [pw.length >= 8, /[A-Z]/.test(pw), /[0-9]/.test(pw)];
    const passed = checks.filter(Boolean).length;
    const labels = ['Weak', 'Fair', 'Strong'];
    const colors = ['var(--danger)', 'var(--warning, #d4a843)', 'var(--success, #3fb950)'];
    el.textContent = labels[passed - 1] || 'Weak';
    el.style.color = colors[passed - 1] || colors[0];
  });

  document.getElementById('signup-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name            = document.getElementById('name').value;
    const email           = document.getElementById('email').value;
    const password        = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const err             = document.getElementById('form-error');
    err.textContent = '';
    err.classList.remove('visible');

    const result = await auth.signup(name, email, password, confirmPassword);
    if (result.ok) {
      location.href = 'dashboard.html';
    } else {
      err.textContent = result.msg;
      err.classList.add('visible');
    }
  });
</script>
</body>
</html>
