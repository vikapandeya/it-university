<!doctype html>
<html lang="en" data-depth="2">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — IT University</title>
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-box__logo"><span style="color:var(--accent)">IT</span><span>University</span></div>
    <h1>Welcome back</h1>
    <p>Sign in to continue your learning journey.</p>

    <div class="form-error" id="form-error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:8px">Sign In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
    <div class="auth-switch" style="margin-top:8px">
      <small style="color:var(--text-muted)">Demo: admin@itu.local / Admin123!</small>
    </div>
  </div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  if (store.currentUser()) location.href = 'dashboard.html';

  // Show error if redirected from admin page with err=admin
  if (new URLSearchParams(location.search).get('err') === 'admin') {
    const err = document.getElementById('form-error');
    if (err) { err.textContent = 'Admin access required.'; err.classList.add('visible'); }
  }

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const err      = document.getElementById('form-error');
    err.textContent = '';
    err.classList.remove('visible');

    const result = await auth.login(email, password);
    if (result.ok) {
      location.href = 'dashboard.html';
    } else {
      err.textContent = result.msg;
      err.classList.add('visible');
    }
  });
</script>
</body>
</html>
