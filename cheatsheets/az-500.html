<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-500 Azure Security Engineer Cheat Sheet</title>
<meta name="description" content="Complete AZ-500 Azure Security Engineer Associate certification cheat sheet.">
<style>
:root{--bg:#F5F6F7;--surface:#FFFFFF;--border:#E2E4E8;--navy:#0F1C2E;--navy2:#1A2E45;--purple:#6B21A8;--purple-soft:#F5F0FF;--azure:#0078D4;--azure-soft:#EFF6FF;--blue:#1A6FB5;--blue-soft:#EBF4FF;--green:#1B7A4A;--green-soft:#E8F7EF;--red:#B91C1C;--red-soft:#FEF2F2;--orange:#EA580C;--orange-soft:#FFF7ED;--text:#1C2333;--text2:#4A5568;--text3:#718096;--mono:"Consolas","Courier New",monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
body{font-family:var(--sans);font-size:11px;background:var(--bg);color:var(--text);line-height:1.5;margin:0}
.page{max-width:1280px;margin:0 auto;padding:20px 16px}
.header{background:var(--navy);border-radius:10px;padding:20px 24px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:22px;font-weight:800;color:#fff}.header-left h1 span{color:#F87171}
.header-left p{font-size:11px;color:#94A3B8;margin-top:3px}
.header-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.badge-purple{background:#A855F7;color:#fff}.badge-azure{background:#0078D4;color:#fff}.badge-blue{background:#3B82F6;color:#fff}.badge-green{background:#22C55E;color:#fff}.badge-red{background:#EF4444;color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.grid-2{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.card-header{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.card-header .icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.card-header h2{font-size:11.5px;font-weight:800;color:var(--navy)}
.card-header .sub{font-size:9px;color:var(--text3);margin-left:auto}
.card-body{padding:10px 12px}
.section-label{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:5px;margin-top:9px}
.section-label:first-child{margin-top:0}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid #F1F3F5;gap:8px}
.row:last-child{border-bottom:none}
.row .key{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--navy);white-space:nowrap;flex-shrink:0}
.row .val{font-size:10px;color:var(--text2);text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.tag{font-size:9.5px;padding:2px 7px;border-radius:4px;font-weight:600;font-family:var(--mono)}
.tag-purple{background:var(--purple-soft);color:#6B21A8}.tag-azure{background:var(--azure-soft);color:#1D4ED8}
.tag-blue{background:var(--blue-soft);color:#1E40AF}.tag-green{background:var(--green-soft);color:#166534}.tag-orange{background:var(--orange-soft);color:#9A3412}
.tag-red{background:var(--red-soft);color:#991B1B}
.tip-bar{background:var(--navy2);border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap}
.tip-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#A78BFA}
.tip{font-size:10.5px;color:#CBD5E1}.tip b{color:#fff}
.note{font-size:10px;color:var(--text2);padding:6px 8px;border-radius:4px;margin-top:4px}
.note-purple{background:var(--purple-soft);border-left:3px solid var(--purple)}
.note-azure{background:var(--azure-soft);border-left:3px solid var(--azure)}
.note-blue{background:var(--blue-soft);border-left:3px solid var(--blue)}
.note-green{background:var(--green-soft);border-left:3px solid var(--green)}
.note-red{background:var(--red-soft);border-left:3px solid var(--red)}
.cmd{font-family:var(--mono);font-size:10px;background:#F1F3F5;padding:3px 7px;border-radius:4px;color:var(--navy);display:block;margin:2px 0}
@media print{body{background:#fff}.page{padding:0}}
</style>
</head>
<body>
<div class="page">
